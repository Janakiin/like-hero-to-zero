<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>CO₂ Dashboard</title>
</head>
<body>
<h1>CO₂ Dashboard</h1>

<form th:action="@{/emissions}" method="get">
    <label for="country">Wähle ein Land:</label>
    <select name="countryId" id="country" required>
        <option th:each="c : ${countries}" th:value="${c.id}" th:text="${c.name}"></option>
    </select>
    <button type="submit">Anzeigen</button>
</form>

</body>
</html>
