<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Emissions Overview</title>
</head>

<body>

<h2>CO₂ Emissions</h2>

<table border="1">

    <thead>
    <tr>
        <th>Year</th>
        <th>Emission Value</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="e : ${emissionsPage.content}">
        <td th:text="${e.year}"></td>
        <td th:text="${#numbers.formatDecimal(e.value,1,'POINT',2,'NONE')}"></td>
    </tr>
    </tbody>

</table>

</body>
</html>
