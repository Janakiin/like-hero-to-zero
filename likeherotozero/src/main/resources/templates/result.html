<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Emission Result</title>
</head>

<body>

<h1>CO2 Emissions Result</h1>

<div th:if="${emission != null}">

    <p>
        Country:
        <span th:text="${emission.country.name}"></span>
    </p>

    <p>
        Year:
        <span th:text="${emission.year}"></span>
    </p>

    <p>
        CO2 (kt):
        <span th:text="${emission.co2Kt}"></span>
    </p>

    <p>
        Source:
        <span th:text="${emission.source}"></span>
    </p>

</div>

<div th:if="${emission == null}">
    <p>No data found for this country.</p>
</div>

<a href="/">Back</a>

</body>
</html>
